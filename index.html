<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #4299e1;
            margin-bottom: 10px;
        }

        .header p {
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .input-section {
            background-color: #2d3748;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            background-color: #1a202c;
            border: 2px solid #4a5568;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4299e1;
        }

        .input-group button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.4);
        }

        .input-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #4299e1;
            font-weight: 600;
            margin-top: 20px;
        }

        .cards-section {
            background-color: #2d3748;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .cards-section h2 {
            color: #f6ad55;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #4a5568;
            transition: all 0.3s;
        }

        .user-card:hover {
            transform: translateY(-5px);
            border-color: #4299e1;
            box-shadow: 0 8px 16px rgba(66, 153, 225, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .username {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .total-count {
            font-size: 1.8rem;
            font-weight: 700;
            color: #68d391;
        }

        .streak-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .stat-item {
            font-size: 0.95rem;
            color: #cbd5e0;
        }

        .stat-item b {
            font-weight: 700;
        }

        .easy { color: #68d391; }
        .medium { color: #f6ad55; }
        .hard { color: #fc8181; }
        .ranking { color: #63b3ed; }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .card-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .update-btn {
            background-color: #4299e1;
            color: white;
        }

        .update-btn:hover {
            background-color: #3182ce;
        }

        .remove-btn {
            background-color: #e53e3e;
            color: white;
        }

        .remove-btn:hover {
            background-color: #c53030;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #2d3748;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .modal-content p {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .modal-content button {
            padding: 12px 30px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .modal-content button:hover {
            background-color: #3182ce;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .input-group {
                flex-direction: column;
            }

            .input-group input {
                min-width: 100%;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LeetCode Tracker</h1>
            <p>Track your friends' LeetCode progress</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input
                    type="text"
                    id="usernameInput"
                    placeholder="Enter LeetCode Username"
                />
                <button id="addBtn">Add User</button>
            </div>
            <div id="loading" class="loading">Fetching data...</div>
        </div>

        <div class="cards-section">
            <h2>Friends Progress</h2>
            <div id="cardsContainer" class="cards-grid">
                <div class="empty-state">
                    No users added yet. Add a username to get started!
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalMessage"></p>
            <button id="modalBtn">OK</button>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('usernameInput');
        const addBtn = document.getElementById('addBtn');
        const loading = document.getElementById('loading');
        const cardsContainer = document.getElementById('cardsContainer');
        const modal = document.getElementById('modal');
        const modalMessage = document.getElementById('modalMessage');
        const modalBtn = document.getElementById('modalBtn');

        let users = [];

        function showModal(message) {
            modalMessage.textContent = message;
            modal.style.display = 'flex';
        }

        modalBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        function calculateStreak(calendar) {
            if (!calendar) return 0;
            const timestamps = Object.keys(calendar).map(Number).sort((a, b) => b - a);
            if (timestamps.length === 0) return 0;
            
            const oneDay = 86400;
            const today = Math.floor(Date.now() / 1000);
            const todayStart = today - (today % oneDay);
            
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const dayStart = todayStart - (i * oneDay);
                const dayEnd = dayStart + oneDay;
                const hasSubmission = timestamps.some(ts => ts >= dayStart && ts < dayEnd);
                
                if (hasSubmission) {
                    streak++;
                } else if (i > 1) {
                    break;
                }
            }
            return streak;
        }

        async function fetchUserData(username) {
            const response = await fetch(`https://leetcode-api-faisalshohag.vercel.app/${username}`);
            if (!response.ok) throw new Error('User not found');
            
            const data = await response.json();
            const streak = calculateStreak(data.submissionCalendar);
            
            return {
                username: data.username || username,
                totalSolved: data.totalSolved || 0,
                easySolved: data.easySolved || 0,
                mediumSolved: data.mediumSolved || 0,
                hardSolved: data.hardSolved || 0,
                ranking: data.ranking || 'N/A',
                streak: streak
            };
        }

        function renderCards() {
            if (users.length === 0) {
                cardsContainer.innerHTML = '<div class="empty-state">No users added yet. Add a username to get started!</div>';
                return;
            }

            users.sort((a, b) => b.totalSolved - a.totalSolved);

            cardsContainer.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="card-header">
                        <span class="username">${user.username}</span>
                        <span class="total-count">${user.totalSolved}</span>
                    </div>
                    ${user.streak > 0 ? `<div class="streak-badge">🔥 ${user.streak} day streak</div>` : ''}
                    <div class="stats-grid">
                        <div class="stat-item">Easy: <b class="easy">${user.easySolved}</b></div>
                        <div class="stat-item">Medium: <b class="medium">${user.mediumSolved}</b></div>
                        <div class="stat-item">Hard: <b class="hard">${user.hardSolved}</b></div>
                        <div class="stat-item">Rank: <b class="ranking">${user.ranking}</b></div>
                    </div>
                    <div class="card-actions">
                        <button class="update-btn" onclick="updateUser('${user.username}')">Update</button>
                        <button class="remove-btn" onclick="removeUser('${user.username}')">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        async function addOrUpdateUser(username) {
            if (!username) {
                showModal('Please enter a username');
                return;
            }

            loading.style.display = 'block';
            addBtn.disabled = true;

            try {
                const userData = await fetchUserData(username);
                const index = users.findIndex(u => u.username.toLowerCase() === username.toLowerCase());

                if (index > -1) {
                    users[index] = userData;
                    showModal(`Updated ${username}'s progress!`);
                } else {
                    users.push(userData);
                    showModal(`Added ${username} successfully!`);
                }

                renderCards();
                usernameInput.value = '';
            } catch (error) {
                showModal(`Failed to fetch data for ${username}. Please check the username.`);
            } finally {
                loading.style.display = 'none';
                addBtn.disabled = false;
            }
        }

        function updateUser(username) {
            addOrUpdateUser(username);
        }

        function removeUser(username) {
            users = users.filter(u => u.username.toLowerCase() !== username.toLowerCase());
            renderCards();
            showModal(`Removed ${username}`);
        }

        addBtn.addEventListener('click', () => {
            addOrUpdateUser(usernameInput.value.trim());
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addOrUpdateUser(usernameInput.value.trim());
            }
        });
    </script>
</body>
</html>
